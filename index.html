<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <!-- Include A-Frame library -->
  <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@9b8609bd84a292ef97bf1e8589401ae0d3201280/dist/aframe-master.min.js"></script>
  <!-- Include AR.js with marker support -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
	<body style='margin: 0px; overflow: hidden; font-family: Monospace;'>
  <div style='position: fixed; top: 10px; width: 100%; text-align: center; z-index: 1;'></div>

  <!-- A-Frame scene with AR.js components -->
  <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'>

    <!-- Marker definition with barcode type and value '1' -->
    <a-marker type='barcode' value='1'>
      <!-- Video element embedded in the marker -->
      <a-video 
        rotation="90 0 0"
        src="./video.mp4"></a-video>
    </a-marker>

    <!-- Entity for the AR camera -->
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
